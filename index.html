<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanu Labs Research UI</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0b0b2a,#000);
color:white;
overflow-x:hidden;
}

/* animated glow background */
.glow{
position:fixed;
width:300px;
height:300px;
background:cyan;
filter:blur(120px);
opacity:0.15;
border-radius:50%;
animation:move 8s infinite alternate;
}
@keyframes move{
0%{top:10%;left:10%}
100%{top:70%;left:70%}
}

/* header */
header{
text-align:center;
padding:20px;
}

.logo{
font-size:32px;
color:#00f7ff;
text-shadow:0 0 20px cyan;
font-weight:bold;
}

.banner{
opacity:0.7;
}

/* buttons */
.top{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

.btn{
padding:10px 14px;
border-radius:10px;
border:1px solid cyan;
background:#111;
color:white;
cursor:pointer;
transition:0.3s;
}
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 15px cyan;
}

/* cards */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.2);
border-radius:15px;
padding:15px;
cursor:pointer;
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 0 25px cyan;
}

.card img{
width:100%;
border-radius:10px;
margin-top:10px;
height:160px;
object-fit:cover;
}

/* MODAL FIX (MAIN FIX) */
.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.85);
}

.modal-box{
width:92%;
height:92%;
background:#0d0d18;
border:1px solid cyan;
border-radius:15px;
overflow-y:auto;   /* IMPORTANT FIX */
padding:20px;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

.close{
float:right;
color:red;
cursor:pointer;
font-size:20px;
}

/* text readability FIX */
h2,h3,p{
line-height:1.6;
}

/* form */
input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111;
border:1px solid cyan;
color:white;
border-radius:10px;
}

.submit{
background:cyan;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

</div>
