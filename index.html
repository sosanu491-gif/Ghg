<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanu Inferno Labs</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#050515,#000);
color:white;
overflow-x:hidden;
}

.glow{
position:fixed;
width:350px;height:350px;
background:cyan;
filter:blur(130px);
opacity:0.15;
border-radius:50%;
animation:move 10s infinite alternate;
}

@keyframes move{
0%{top:5%;left:5%}
100%{top:75%;left:70%}
}

header{
text-align:center;
padding:18px;
}

.logo{
font-size:34px;
color:#00f7ff;
text-shadow:0 0 30px cyan;
}

.sub{
opacity:0.7;
margin-top:5px;
}

.btnbar{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:10px;
}

.btn{
padding:10px 14px;
border-radius:10px;
border:1px solid cyan;
background:#111;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
box-shadow:0 0 18px cyan;
transform:scale(1.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.04);
border:1px solid rgba(0,255,255,0.25);
border-radius:15px;
padding:12px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-7px);
box-shadow:0 0 30px cyan;
}

.card img{
width:100%;
height:170px;
object-fit:cover;
border-radius:10px;
margin-top:10px;
}

.modal{
position:fixed;
inset:0;
display:none;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.box{
width:92%;
height:92%;
background:#0c0c1a;
border:1px solid cyan;
border-radius:15px;
padding:20px;
overflow-y:auto;
}

.close{
float:right;
color:red;
cursor:pointer;
font-size:18px;
}

.section{
margin-bottom:18px;
padding:12px;
border-left:3px solid cyan;
background:rgba(255,255,255,0.03);
border-radius:10px;
}

h2,h3{color:#00f7ff}

img{
width:100%;
border-radius:10px;
margin:10px 0;
}
</style>
</head>

<body>

<div class="glow"></div>

<header>
<div class="logo">🚀 Sanu Inferno Labs</div>
<div class="sub">Research • Logic • Defense • Medical • Energy Systems</div>

<div class="btnbar">
<button class="btn" onclick="window.open('https://instagram.com/sanuinferno')">📷 Instagram</button>
<button class="btn" onclick="openContact()">Contact</button>
<button class="btn" onclick="openIdea()">Submit Idea</button>
</div>
</header>

<div class="grid">

<div class="card" onclick="openPanel('medical')">
Medical Research
<img src="https://images.unsplash.com/photo-1581091012184-5c3d7b7c2a1f">
</div>

<div class="card" onclick="openPanel('defence')">
Defense Systems
<img src="https://images.unsplash.com/photo-1614064641938-3bbee52942c7">
</div>

<div class="card" onclick="openPanel('energy')">
Energy Science
<img src="https://images.unsplash.com/photo-1509395176047-4a66953fd231">
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">
<span class="close" onclick="closePanel()">❌ Close</span>
<div id="content"></div>
</div>
</div>

<script>

function section(title,p,s,i,img){
return `
<div class="section">
<h3>${title}</h3>

<img src="${img}">

<p><b>Problem:</b> ${p}</p>
<p><b>Solution:</b> ${s}</p>
<p><b>Innovation:</b> ${i}</p>
</div>
`;
}

function openPanel(type){

document.getElementById("modal").style.display="flex";

let data="";

/* ---------------- MEDICAL ---------------- */
if(type==="medical"){
data=`
<h2>🧬 Medical Research Systems</h2>

${section(
"Organ-on-a-Chip",
"Animal testing human body ko accurately simulate nahi karta.",
"Microfluidic chip par human cells ko lab environment me grow kiya jata hai.",
"Drug testing real human physiology jaise behavior show karta hai.",
"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
)}

${section(
"CRISPR Gene Editing",
"Genetic disease DNA mutation se hoti hai.",
"Cas9 enzyme DNA ko cut karke correct sequence insert karta hai.",
"Disease ko permanently remove kiya jata hai.",
"https://images.unsplash.com/photo-1628595351029-c2bf17511435"
)}

${section(
"3D Bioprinting",
"Organ shortage aur rejection major problem hai.",
"Stem cells se layer-by-layer organs print hote hain.",
"Patient matching organs ready ho jate hain.",
"https://images.unsplash.com/photo-1581093458791-9d42a3c5a1f0"
)}
`;
}

/* ---------------- DEFENCE ---------------- */
if(type==="defence"){
data=`
<h2>🛡️ Defense Logic Systems</h2>

${section(
"Stealth Metamaterials",
"Radar systems aircraft detect kar lete hain.",
"Metamaterials waves ko bend karke invisibility create karte hain.",
"Aircraft radar se invisible ho jata hai.",
"https://images.unsplash.com/photo-1508610048659-a06b669e3321"
)}

${section(
"Swarm Drone Intelligence",
"Single drone easily destroy hota hai.",
"Hazaro drones AI swarm logic se coordinate karte hain.",
"System decentralized aur self-healing hota hai.",
"https://images.unsplash.com/photo-1508614999368-9260051292e5"
)}

${section(
"Quantum Encryption",
"Data hacking ka risk hota hai.",
"Photon based quantum state communication use hota hai.",
"Intercept karte hi system detect kar leta hai.",
"https://images.unsplash.com/photo-1635070041078-e363dbe005cb"
)}
`;
}

/* ---------------- ENERGY ---------------- */
if(type==="energy"){
data=`
<h2>⚡ Energy Science Systems</h2>

${section(
"Transparent Solar Glass",
"Space limitation aur rooftop dependency hoti hai.",
"Glass UV/IR light ko energy me convert karta hai.",
"Buildings khud power generators ban jate hain.",
"https://images.unsplash.com/photo-1509391366360-2e959784a276"
)}

${section(
"Hydrogen Fuel Cell",
"Battery pollution aur slow charging problem hai.",
"Hydrogen reaction se electricity aur water output milta hai.",
"Zero emission clean energy system ban jata hai.",
"https://images.unsplash.com/photo-1581091870622-1e7d6d6f6bde"
)}

${section(
"Space Solar Energy",
"Earth par sunlight limited hoti hai.",
"Space satellites continuous solar energy collect karte hain.",
"Infinite clean power Earth ko mil sakti hai.",
"https://images.unsplash.com/photo-1446776811953-b23d57bd21aa"
)}
`;
}

/* CONTACT */
if(type==="contact"){
data=`
<h2>📞 Contact Sanu Inferno Labs</h2>

<div class="section">
<p>📷 Instagram: <b>@sanuinferno</b></p>
<p>📱 WhatsApp: +91 6299386787</p>
<p>📧 Email: sanu491@gmail.com</p>
</div>
`;
}

/* IDEA */
if(type==="idea"){
data=`
<h2>💡 Submit Research Idea</h2>

<div class="section">
<input placeholder="Your Name">
<textarea rows="5" placeholder="Write your research idea..."></textarea>
<button class="btn" style="margin-top:10px;">Submit Idea</button>
</div>
`;
}

document.getElementById("content").innerHTML=data;
}

function openContact(){openPanel("contact")}
function openIdea(){openPanel("idea")}
function closePanel(){document.getElementById("modal").style.display="none"}

</script>

</body>
</html>
